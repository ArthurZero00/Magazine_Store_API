name: First Job
on:
  push:
    branches: 
    - "main"
jobs:
  stage:
     runs-on: Linux
     steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          
      - name: Install deps
        run: npm install
      - name: Run tests
        run: npm test
      - name: Build project
        run: npm run build
